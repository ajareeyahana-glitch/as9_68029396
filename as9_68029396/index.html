<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Pro UI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body {
    background: linear-gradient(135deg,#0f0026,#2a004d);
    color: white;
}

/* LOADING */
#loader {
    position: fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
.loader-text {
    font-size:30px;
    animation: blink 1s infinite;
}
@keyframes blink {50%{opacity:0;}}

/* PARTICLES */
#particles-js {
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* VIDEO */
.banner {position:relative;height:100vh;}
.banner video {width:100%;height:100%;object-fit:cover;}
.banner-text {
    position:absolute;top:40%;width:100%;text-align:center;
    font-size:40px;font-weight:bold;
}

/* BUTTON */
.neon-btn {
    padding:10px 25px;
    border:2px solid #cc66ff;
    background:transparent;
    color:white;
}
.neon-btn:hover {
    background:#cc66ff;
    box-shadow:0 0 20px #cc66ff;
}

/* CARD FLIP */
.flip-card {perspective:1000px;}
.flip-inner {
    position:relative;height:350px;
    transition:0.8s;transform-style:preserve-3d;
}
.flip-card:hover .flip-inner {transform:rotateY(180deg);}
.flip-front,.flip-back {
    position:absolute;width:100%;height:100%;
    backface-visibility:hidden;
}
.flip-front img {width:100%;height:100%;object-fit:cover;}
.flip-back {background:#330066;transform:rotateY(180deg);padding:20px;}

/* SCROLL */
.hidden {opacity:0;transform:translateY(50px);transition:1s;}
.show {opacity:1;transform:translateY(0);}

.form-control {background:#1a0033;color:white;border:1px solid #cc66ff;}
footer {background:black;}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader"><div class="loader-text">Loading...</div></div>

<!-- PARTICLES -->
<div id="particles-js"></div>

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark">
<div class="container"><span class="navbar-brand">ANIME</span></div>
</nav>

<!-- VIDEO -->
<div class="banner">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-cyberpunk-city-9716/1080p.mp4">
</video>
<div class="banner-text">
โลกอนิเมะสุดอลังการ <br><br>
<button class="neon-btn sound-btn">เริ่มดูเลย</button>
</div>
</div>

<!-- MOVIES -->
<div class="container mt-5">
<div class="row">

<!-- 1 -->
<div class="col-md-4 hidden">
<div class="flip-card">
<div class="flip-inner">
<div class="flip-front">
<img src="https://upload.wikimedia.org/wikipedia/en/0/0b/Your_Name_poster.png">
</div>
<div class="flip-back">
<h4>Your Name</h4>
<button class="neon-btn sound-btn" data-bs-toggle="modal" data-bs-target="#m1">Trailer</button>
</div>
</div>
</div>
</div>

<!-- 2 -->
<div class="col-md-4 hidden">
<div class="flip-card">
<div class="flip-inner">
<div class="flip-front">
<img src="https://cdn.oneesports.co.th/cdn-data/sites/3/2024/05/Anime_DemonSlayer_AllHashira_2.jpg">
</div>
<div class="flip-back">
<h4>Demon Slayer</h4>
<button class="neon-btn sound-btn" data-bs-toggle="modal" data-bs-target="#m2">Trailer</button>
</div>
</div>
</div>
</div>

<!-- 3 -->
<div class="col-md-4 hidden">
<div class="flip-card">
<div class="flip-inner">
<div class="flip-front">
<img src="https://us-fbcloud.net/wb/data/642/642806-img-1353460959-1.jpg">
</div>
<div class="flip-back">
<h4>Rapunzel</h4>
<button class="neon-btn sound-btn" data-bs-toggle="modal" data-bs-target="#m3">Trailer</button>
</div>
</div>
</div>
</div>

</div>
</div>

<!-- CONTACT -->
<div class="container mt-5 hidden">
<h2>ติดต่อ</h2>
<input class="form-control mb-2" placeholder="ชื่อ">
<input class="form-control mb-2" placeholder="อีเมล">
<textarea class="form-control mb-2"></textarea>
<button class="neon-btn sound-btn">ส่ง</button>
</div>

<!-- FOOTER -->
<footer class="text-center p-4 mt-5">© 2026 Anime</footer>
<footer class="mt-5">

    <div class="footer-text">
        © 2025 Movie By ชื่อคุณ
    </div>

    <div class="social-icons">

        <!-- Facebook -->
        <a href="https://facebook.com" target="_blank" class="facebook sound-btn">
            <i class="fab fa-facebook"></i>
        </a>

        <!-- Instagram -->
        <a href="https://instagram.com" target="_blank" class="instagram sound-btn">
            <i class="fab fa-instagram"></i>
        </a>

        <!-- LINE -->
        <a href="https://line.me" target="_blank" class="line sound-btn">
            <i class="fab fa-line"></i>
        </a>

    </div>

</footer>

<!-- MODALS (YOUTUBE) -->
<div class="modal fade" id="m1">
<div class="modal-dialog modal-lg"><div class="modal-content">
<div class="modal-body">
<iframe width="100%" height="400"
src="https://www.youtube.com/embed/xU47nhruN-Q"
allowfullscreen></iframe>
</div></div></div></div>

<div class="modal fade" id="m2">
<div class="modal-dialog modal-lg"><div class="modal-content">
<div class="modal-body">
<iframe width="100%" height="400"
src="https://www.youtube.com/embed/ATJYac_dORw"
allowfullscreen></iframe>
</div></div></div></div>

<div class="modal fade" id="m3">
<div class="modal-dialog modal-lg"><div class="modal-content">
<div class="modal-body">
<iframe width="100%" height="400"
src="https://www.youtube.com/embed/5Yl0sZz4q9M"
allowfullscreen></iframe>
</div></div></div></div>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// LOADING
window.onload = ()=> document.getElementById("loader").style.display="none";

// SOUND
document.querySelectorAll(".sound-btn").forEach(btn=>{
btn.addEventListener("click",()=>{
document.getElementById("clickSound").play();
});
});

// SCROLL
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){entry.target.classList.add('show');}
});
});
document.querySelectorAll('.hidden').forEach(el=>observer.observe(el));

// PARTICLES
particlesJS("particles-js", {
particles:{number:{value:80},color:{value:"#cc66ff"},size:{value:3},move:{speed:2}}
});
</script>

</body>
</html>
